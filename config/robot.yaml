  ki_id: 10.0
  kp_iq: 0.5
  ki_iq: 10.0
  kp_speed: 0.1
  ki_speed: 2.0
  max_current_a: 3.0

wheels:
  radius_m: 0.035
  base_width_m: 0.15

bms:
  cells: 4
  full_mv: 16800
  empty_mv: 12000
  capacity_mah: 5200
