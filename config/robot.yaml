# H747 + RK3566 Triple-Core Robot Configuration
h747:
  m7:
    clock_mhz: 480
    foc_freq_hz: 20000
    imu_rate_hz: 1000
    ipc_uart_baud: 3000000
  m4:
    clock_mhz: 240
    safety_rate_hz: 100
    bms_rate_hz: 10
    tof_rate_hz: 100
