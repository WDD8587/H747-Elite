name: 'Build M7 Firmware'
description: 'Build STM32H747 M7 core firmware with ARM GCC toolchain'

inputs:
  build_type:
    description: 'CMake build type (Debug or Release)'
    required: true
    default: 'Release'
  extra_cmake_args:
    description: 'Extra CMake arguments'
    required: false
    default: ''

outputs:
  firmware_bin:
    description: 'Path to the built M7 binary'
    value: 'firmware/build/m7/firmware.bin'
  firmware_hex:
    description: 'Path to the built M7 hex'
    value: 'firmware/build/m7/firmware.hex'
  firmware_elf:
    description: 'Path to the built M7 ELF'
    value: 'firmware/build/m7/firmware.elf'
  firmware_map:
    description: 'Path to the build map file'
    value: 'firmware/build/m7/firmware.map'

runs:
  using: 'composite'
  steps:
    - name: Install ARM GCC
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcc-arm-none-eabi binutils-arm-none-eabi

    - name: Verify toolchain
      shell: bash
      run: |
        arm-none-eabi-gcc --version
        arm-none-eabi-g++ --version

    - name: Configure CMake (M7)
      shell: bash
      run: |
        cd firmware
        cmake -B build/m7 \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain_arm_none_eabi.cmake \
          -DTARGET_CORE=M7 \
          ${{ inputs.extra_cmake_args }}

    - name: Build M7 firmware
      shell: bash
      run: |
        cd firmware
        cmake --build build/m7 -j$(nproc)

    - name: List build outputs
      shell: bash
      run: |
        ls -lh firmware/build/m7/
        echo "=== Build artifacts ==="
        find firmware/build/m7 -name "*.bin" -o -name "*.hex" -o -name "*.elf" -o -name "*.map" | sort

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-m7
        path: |
          firmware/build/m7/firmware.bin
          firmware/build/m7/firmware.hex
          firmware/build/m7/firmware.elf
          firmware/build/m7/firmware.map
        if-no-files-found: error
