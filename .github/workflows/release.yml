name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_m7:
    name: Build M7 Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build_m7
        with:
          build_type: Release

  build_m4:
    name: Build M4 Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build_m4
        with:
          build_type: Release

  build_rk:
    name: Build RK3566 App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build_rk
        with:
          build_type: Release

  test:
    name: Run Test Suite
    needs: [build_m7, build_m4, build_rk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake gcc-arm-none-eabi build-essential
      - name: Run unit tests
        run: |
          cd tests
          make test

  release:
    name: Create GitHub Release
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate release notes
        run: |
          echo "## H747 Elite Firmware ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| firmware-m7 | M7 core firmware (.bin/.hex/.elf) |" >> $GITHUB_STEP_SUMMARY
          echo "| firmware-m4 | M4 core firmware (.bin/.hex/.elf) |" >> $GITHUB_STEP_SUMMARY
          echo "| firmware-rk | RK3566 application |" >> $GITHUB_STEP_SUMMARY
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: "H747 Elite firmware release ${{ github.ref_name }}"
          draft: false
          prerelease: false
