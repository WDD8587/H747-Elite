name: Nightly Build

on:
  schedule:
    - cron: '7 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_test:
    name: Nightly Build & Extended Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake gcc-arm-none-eabi gcc-aarch64-linux-gnu \
            build-essential python3-pip cppcheck lcov
          pip install pytest gcovr

      - name: Build M7 firmware
        run: |
          cd firmware
          cmake -B build/m7 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain_arm_none_eabi.cmake \
            -DTARGET_CORE=M7
          cmake --build build/m7 -j$(nproc)

      - name: Build M4 firmware
        run: |
          cd firmware
          cmake -B build/m4 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain_arm_none_eabi.cmake \
            -DTARGET_CORE=M4
          cmake --build build/m4 -j$(nproc)

      - name: Run unit tests
        run: |
          cd tests
          make test

      - name: Static analysis (cppcheck)
        run: |
          cppcheck --enable=warning,performance,portability \
                   --suppress=missingIncludeSystem \
                   --error-exitcode=1 \
                   --std=c11 --inline-suppr \
                   --include=firmware/stubs/stm32h7xx_hal.h \
                   l1_m7/ l1_m4/ shared/ tests/
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-firmware
          path: |
            firmware/build/m7/firmware.bin
            firmware/build/m7/firmware.hex
            firmware/build/m7/firmware.elf
            firmware/build/m4/firmware.bin
            firmware/build/m4/firmware.hex
            firmware/build/m4/firmware.elf
          retention-days: 7
